name: Monitor and Release BepInEx

on:
  schedule:
    - cron: "0 * * * *" # Run every hour
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - master # Trigger on pushes to master, but we will check for new commits in the workflow

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest commit of BepInEx
        id: remote
        run: |
          SHA=$(git ls-remote https://github.com/BepInEx/BepInEx.git refs/heads/master | cut -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Latest commit on BepInEx/BepInEx: $SHA"

      - name: Get last released commit
        id: local
        run: |
          # Fetch tags to find the last bleeding-edge release
          git clone --depth=1 https://github.com/${{ github.repository }}.git repo
          cd repo
          LAST_SHA=$(git log -n 1 --format=%b | grep "BepInEx-Commit:" | cut -d':' -f2 | xargs || echo "none")
          echo "last_sha=$LAST_SHA" >> $GITHUB_OUTPUT
          echo "Last released commit: $LAST_SHA"

      - name: Compare Commits
        id: compare
        run: |
          if [ "${{ steps.remote.outputs.sha }}" == "${{ steps.local.outputs.last_sha }}" ]; then
            echo "No new commits found. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New commit found. Starting build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout BepInEx/BepInEx
        if: steps.compare.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          repository: BepInEx/BepInEx
          ref: master
          fetch-depth: 0

      - name: Collect build info
        if: steps.compare.outputs.should_build == 'true'
        id: info
        uses: actions/github-script@v7
        with:
          script: |
            core.setOutput("build_type", "BleedingEdge");
            let shortHash = "";
            await exec.exec("git", ["rev-parse", "--short", "HEAD"], {
                listeners: {
                    stdout: d => shortHash += d.toString().trim(),
                }
            });
            core.setOutput("sha_short", shortHash);
            core.setOutput("build_id", context.runNumber + 600);

      - uses: actions/setup-dotnet@v4
        if: steps.compare.outputs.should_build == 'true'
        with:
          dotnet-version: "8.0.x"

      - name: Build
        if: steps.compare.outputs.should_build == 'true'
        run: |
          # Find last successful commit within BepInEx repo if possible, or fallback
          # For simplicity in this external monitor, we use the current HEAD~1 as a guess for changelog
          LAST_COMMIT=$(git rev-parse HEAD~1)
          ./build.sh --target Publish --build-type ${{ steps.info.outputs.build_type }} --build-id ${{ steps.info.outputs.build_id }} --last-build-commit "$LAST_COMMIT" --nuget-api-key "${{ secrets.BEPIN_DEV_NUGET_KEY }}"

      - name: Generate changelog
        if: steps.compare.outputs.should_build == 'true'
        id: generate_changelog
        run: |
          LAST_COMMIT="${{ steps.local.outputs.last_sha }}"
          if [ "$LAST_COMMIT" == "none" ]; then
            LAST_COMMIT=$(git rev-parse HEAD~5) # Default to last 5 commits if no previous release
          fi
          changelog=$(git --no-pager log --no-merges --pretty="format:- (\`%h\`) [%an] %s" $LAST_COMMIT..HEAD)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Publish Release
        if: steps.compare.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bleeding-edge-${{ steps.info.outputs.build_id }}
          name: BepInEx Bleeding Edge Build #${{ steps.info.outputs.build_id }}
          body: |
            BepInEx Bleeding Edge automated build from upstream master.

            **Upstream Commit:** ${{ steps.remote.outputs.sha }}
            **BepInEx-Commit:** ${{ steps.remote.outputs.sha }}

            ### Changelog
            ${{ steps.generate_changelog.outputs.changelog }}
          prerelease: true
          files: ./bin/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
