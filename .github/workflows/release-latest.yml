name: Monitor and Release BepInEx

on:
  schedule:
    - cron: "0 * * * *" # Run every hour
  workflow_dispatch: # Allow manual trigger
    inputs:
      build_id:
        description: "Specific Build ID to build (run_number + 600). Leave empty for latest."
        required: false
        type: string
  push:
    branches:
      - master

permissions:
  contents: write

env:
  TAG_VERSION: "6.0.0"

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get Target Info
        id: target
        uses: actions/github-script@v8
        with:
          script: |
            const buildIdInput = context.payload.inputs ? context.payload.inputs.build_id : '';
            let targetSha = '';
            let targetBuildId = '';
            let shouldBuild = false;

            if (buildIdInput) {
                const runNumber = parseInt(buildIdInput) - 600;
                const runs = await github.rest.actions.listWorkflowRuns({
                    owner: 'BepInEx',
                    repo: 'BepInEx',
                    workflow_id: 'build.yml',
                    per_page: 100
                });
                const targetRun = runs.data.workflow_runs.find(r => r.run_number === runNumber);
                if (targetRun) {
                    targetSha = targetRun.head_sha;
                    targetBuildId = buildIdInput;
                    shouldBuild = true;
                } else {
                    core.setFailed(`Could not find upstream run with number ${runNumber}`);
                }
            } else {
                // Polling logic for latest
                const { data: ref } = await github.rest.git.getRef({
                    owner: 'BepInEx',
                    repo: 'BepInEx',
                    ref: 'heads/master'
                });
                const latestSha = ref.object.sha;
                
                let lastSha = 'none';
                try {
                    const releases = await github.rest.repos.listReleases({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        per_page: 10
                    });
                    const lastRelease = releases.data.find(r => r.tag_name.includes("-be."));
                    if (lastRelease) {
                        const match = lastRelease.body.match(/BepInEx-Commit:\s*([a-f0-9]{7,40})/);
                        if (match) lastSha = match[1];
                    }
                } catch (e) {
                    console.log("No previous releases found.");
                }

                if (latestSha !== lastSha) {
                    shouldBuild = true;
                    targetSha = latestSha;
                    
                    const runs = await github.rest.actions.listWorkflowRuns({
                        owner: 'BepInEx',
                        repo: 'BepInEx',
                        workflow_id: 'build.yml',
                        branch: 'master',
                        per_page: 1
                    });
                    const runNumber = runs.data.total_count > 0 ? runs.data.workflow_runs[0].run_number : context.runNumber;
                    targetBuildId = (runNumber + 600).toString();
                }
            }

            // CHECK IF ALREADY RELEASED
            if (shouldBuild && targetBuildId) {
                const tagName = `v${process.env.TAG_VERSION}-be.${targetBuildId}`;
                try {
                    await github.rest.repos.getReleaseByTag({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        tag: tagName
                    });
                    console.log(`Release ${tagName} already exists. Skipping build.`);
                    shouldBuild = false;
                } catch (e) {
                    // Tag does not exist, proceed with build
                    console.log(`Release ${tagName} not found. Proceeding.`);
                }
            }

            core.setOutput("should_build", shouldBuild);
            core.setOutput("target_sha", targetSha);
            core.setOutput("build_id", targetBuildId);

      - name: Checkout BepInEx/BepInEx
        if: steps.target.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          repository: BepInEx/BepInEx
          ref: ${{ steps.target.outputs.target_sha }}
          fetch-depth: 0

      - name: Collect build info
        if: steps.target.outputs.should_build == 'true'
        id: info
        run: |
          short_hash=$(git rev-parse --short HEAD)
          echo "sha_short=$short_hash" >> $GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        if: steps.target.outputs.should_build == 'true'
        with:
          dotnet-version: "8.0.x"

      - name: Build
        if: steps.target.outputs.should_build == 'true'
        run: |
          # Use HEAD~1 for changelog fallback
          LAST_COMMIT=$(git rev-parse HEAD~1)
          ./build.sh --target Publish --build-type BleedingEdge --build-id ${{ steps.target.outputs.build_id }} --last-build-commit "$LAST_COMMIT" --nuget-api-key "${{ secrets.BEPIN_DEV_NUGET_KEY }}"

      - name: Generate changelog
        if: steps.target.outputs.should_build == 'true'
        id: generate_changelog
        run: |
          # Show recent commits for the target SHA
          changelog=$(git --no-pager log --no-merges --pretty="format:- (\`%h\`) [%an] %s" -n 10)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Publish Release
        if: steps.target.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TAG_VERSION }}-be.${{ steps.target.outputs.build_id }}
          name: BepInEx Bleeding Edge Build ${{ steps.target.outputs.build_id }}
          body: |
            BepInEx Bleeding Edge automated build from upstream.

            **Upstream Commit:** ${{ steps.target.outputs.target_sha }}
            **BepInEx-Commit:** ${{ steps.target.outputs.target_sha }}

            ### Changelog (Recent Commits)
            ${{ steps.generate_changelog.outputs.changelog }}
          prerelease: true
          files: ./bin/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
